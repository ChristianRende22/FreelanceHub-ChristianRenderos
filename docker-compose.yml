services:
  db:
    image: postgres:16-alpine
    container_name: freelancehub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: BBo
      POSTGRES_DB: freelancehub
    ports:
      - '5433:5432'
    volumes:
      - freelancehub_data:/var/lib/postgresql/data

volumes:
  freelancehub_data:
